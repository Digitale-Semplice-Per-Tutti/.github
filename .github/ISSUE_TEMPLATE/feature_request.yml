name: ✨ Feature Request
description: A new feature or improvement
title: "[FEAT] "
labels: ["feature"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What are we building and why?
      placeholder: "e.g. Add Google login so users don't need a password"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      description: Break down the work step by step
      value: |
        - [ ] 
        - [ ] 
        - [ ] 

  - type: textarea
    id: done-when
    attributes:
      label: Done when
      description: How do we know this is complete?
      placeholder: |
        - [ ] e.g. Feature works on staging
        - [ ] e.g. Edge cases handled

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Anything else relevant — dependencies, links, edge cases, designs
      placeholder: "e.g. Depends on #12, see Figma mockup at..."
