name: ✨ Feature Request
description: A new feature or improvement
title: "[FEAT] "
labels: ["feature"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What are we building and why?
      placeholder: "e.g. Add Google login so users don't need a password"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      description: Break down the work step by step
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: done-when
    attributes:
      label: Done when
      description: How do we know this is complete?
      placeholder: |
        - [ ] e.g. Feature works on staging
        - [ ] e.g. Edge cases handled
    validations:
      required: true

  - type: input
    id: depends-on
    attributes:
      label: Depends on
      description: Any issues that must be completed first
      placeholder: "#12, #34"
    validations:
      required: false
