name: ⚙️ Infrastructure
description: Infrastructure change or improvement
title: "[INFRA] "
labels: ["infrastructure"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What are we changing and why?
      placeholder: "e.g. Improve CI speed by adding caching"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      description: Break down the work step by step
      value: |
        - [ ] 
        - [ ] 
        - [ ] 

  - type: textarea
    id: done-when
    attributes:
      label: Done when
      description: How do we know this is complete and working?
      placeholder: |
        - [ ] e.g. Change applied to staging/prod
        - [ ] e.g. No regressions observed

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Anything relevant — dependencies, risks, environments, links
      placeholder: "e.g. Affects production, depends on Terraform module X"
